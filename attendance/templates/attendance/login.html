<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance System</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0d14;
      --card: #111520;
      --card2: #161b28;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.1);
      --accent: #c9a84c;
      --accent-glow: rgba(201,168,76,0.15);
      --text: #f0ece4;
      --muted: #6a6a7a;
      --muted2: #9a9aaa;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── Animated grid background ── */
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: 0;
    }

    /* ── Glowing orbs ── */
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none; animation: orbFloat 8s ease-in-out infinite alternate; }
    .orb-1 { width: 400px; height: 400px; background: rgba(201,168,76,0.07); top: -100px; right: -100px; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: rgba(91,141,238,0.05); bottom: -80px; left: -80px; animation-delay: -3s; }
    .orb-3 { width: 200px; height: 200px; background: rgba(201,168,76,0.04); bottom: 30%; right: 20%; animation-delay: -5s; }
    @keyframes orbFloat {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(20px,-20px) scale(1.05); }
    }

    /* ── Card ── */
    .login-card {
      position: relative; z-index: 10;
      width: 100%; max-width: 460px;
      margin: 24px;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 28px;
      padding: 52px 44px 44px;
      animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute; top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .login-card::after {
      content: '';
      position: absolute; top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 120px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo ── */
    .logo-wrap { display: flex; justify-content: center; margin-bottom: 32px; animation: fadeUp 0.6s 0.1s cubic-bezier(0.16,1,0.3,1) both; }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #1e2535, #252d42);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,168,76,0.1) inset;
      position: relative;
    }
    .logo-icon::after {
      content: ''; position: absolute; inset: 1px; border-radius: 17px;
      background: linear-gradient(135deg, rgba(201,168,76,0.08), transparent);
      pointer-events: none;
    }

    /* ── Title ── */
    .login-title {
      font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700;
      color: var(--text); text-align: center; line-height: 1.15;
      margin-bottom: 8px; letter-spacing: -0.5px;
      animation: fadeUp 0.6s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }
    .login-sub {
      text-align: center; font-size: 14px; color: var(--muted2);
      margin-bottom: 40px;
      animation: fadeUp 0.6s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ── Buttons ── */
    .btn-teacher, .btn-student, .btn-forgot {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px 24px; border-radius: 14px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      text-decoration: none; cursor: pointer; border: none;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, background 0.2s;
      position: relative; overflow: hidden; letter-spacing: 0.1px;
    }
    .btn-teacher { animation: fadeUp 0.6s 0.25s cubic-bezier(0.16,1,0.3,1) both; }
    .btn-student { animation: fadeUp 0.6s 0.32s cubic-bezier(0.16,1,0.3,1) both; }
    .btn-forgot  { animation: fadeUp 0.6s 0.39s cubic-bezier(0.16,1,0.3,1) both; }

    /* Shimmer */
    .btn-teacher::after, .btn-student::after, .btn-forgot::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
      transform: skewX(-15deg); transition: left 0.5s;
    }
    .btn-teacher:hover::after, .btn-student:hover::after, .btn-forgot:hover::after { left: 160%; }

    .btn-teacher {
      background: var(--card2); color: var(--text);
      border: 1px solid var(--border2); margin-bottom: 12px;
    }
    .btn-teacher:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.18); box-shadow: 0 8px 24px rgba(0,0,0,0.3); background: #1c2235; }
    .btn-teacher:active { transform: scale(0.98); }

    .btn-student {
      background: linear-gradient(135deg, #b8922a, var(--accent), #d4b050);
      color: #1a1200; margin-bottom: 28px; font-weight: 600;
      box-shadow: 0 4px 20px rgba(201,168,76,0.3);
    }
    .btn-student:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(201,168,76,0.45); }
    .btn-student:active { transform: scale(0.98); }

    .divider {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 24px;
      animation: fadeUp 0.6s 0.36s cubic-bezier(0.16,1,0.3,1) both;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 12px; color: var(--muted); letter-spacing: 0.5px; }

    .btn-forgot {
      background: transparent; color: var(--muted2);
      border: 1px solid var(--border); font-size: 14px;
    }
    .btn-forgot:hover { transform: translateY(-1px); color: var(--text); border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.03); }
    .btn-forgot:active { transform: scale(0.98); }

    .btn-icon {
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .btn-teacher .btn-icon { background: rgba(255,255,255,0.06); }
    .btn-student .btn-icon { background: rgba(0,0,0,0.15); }
    .btn-forgot  .btn-icon { background: rgba(255,255,255,0.04); }

    .login-footer {
      text-align: center; margin-top: 28px;
      font-size: 11px; color: var(--muted); letter-spacing: 0.3px;
      animation: fadeUp 0.6s 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-card">

    <div class="logo-wrap">
      <div class="logo-icon">🎓</div>
    </div>

    <h1 class="login-title">Attendance System</h1>
    <p class="login-sub">Choose how you want to sign in</p>

    <a href="{% url 'teacher_login' %}" class="btn-teacher">
      <div class="btn-icon">👨‍🏫</div>
      Teacher Login
    </a>

    <a href="{% url 'student_login' %}" class="btn-student">
      <div class="btn-icon">🎓</div>
      Student Login
    </a>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <a href="{% url 'forgot_password' %}" class="btn-forgot">
      <div class="btn-icon">🔑</div>
      Forgot Password
    </a>

    <div class="login-footer">Online Attendance System &nbsp;·&nbsp; Secure Login</div>

  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Login — Attendance System</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👨‍🏫</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0d14;
      --card: #111520;
      --card2: #161b28;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.1);
      --accent: #c9a84c;
      --accent-glow: rgba(201,168,76,0.15);
      --text: #f0ece4;
      --muted: #6a6a7a;
      --muted2: #9a9aaa;
      --input-bg: #1a1f2e;
      --red: #e05c5c;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
    }

    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
      background-size: 48px 48px; z-index: 0;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none; animation: orbFloat 8s ease-in-out infinite alternate; }
    .orb-1 { width: 400px; height: 400px; background: rgba(201,168,76,0.07); top: -100px; right: -100px; }
    .orb-2 { width: 300px; height: 300px; background: rgba(91,141,238,0.05); bottom: -80px; left: -80px; animation-delay: -3s; }
    .orb-3 { width: 200px; height: 200px; background: rgba(201,168,76,0.04); bottom: 30%; right: 20%; animation-delay: -5s; }
    @keyframes orbFloat { from { transform: translate(0,0) scale(1); } to { transform: translate(20px,-20px) scale(1.05); } }

    /* ── Card ── */
    .login-card {
      position: relative; z-index: 10;
      width: 100%; max-width: 460px; margin: 24px;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 28px;
      padding: 52px 44px 44px;
      animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
      overflow: hidden;
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 15%; right: 15%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .login-card::after {
      content: ''; position: absolute; top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 120px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    @keyframes cardIn { from { opacity:0; transform:translateY(32px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }

    /* ── Back link ── */
    .back-link {
      position: absolute; top: 20px; left: 20px;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted); text-decoration: none;
      padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      animation: fadeUp 0.5s 0.05s cubic-bezier(0.16,1,0.3,1) both;
    }
    .back-link:hover { color: var(--text); border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.03); }

    /* ── Logo ── */
    .logo-wrap { display: flex; justify-content: center; margin-bottom: 24px; animation: fadeUp 0.6s 0.1s cubic-bezier(0.16,1,0.3,1) both; }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #1e2535, #252d42);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center; font-size: 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,168,76,0.1) inset;
      position: relative;
    }
    .logo-icon::after { content: ''; position: absolute; inset: 1px; border-radius: 17px; background: linear-gradient(135deg, rgba(201,168,76,0.08), transparent); pointer-events: none; }

    /* ── Title ── */
    .login-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; color: var(--text); text-align: center; line-height: 1.15; margin-bottom: 10px; letter-spacing: -0.5px; animation: fadeUp 0.6s 0.15s cubic-bezier(0.16,1,0.3,1) both; }

    /* ── Role badge ── */
    .role-badge {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2);
      border-radius: 20px; padding: 4px 14px; font-size: 12px; color: var(--accent);
      width: fit-content; margin: 0 auto 32px;
      animation: fadeUp 0.6s 0.18s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ── Error ── */
    .error-msg {
      background: rgba(224,92,92,0.1); border: 1px solid rgba(224,92,92,0.25);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 20px;
      font-size: 13px; color: #f08080; display: flex; align-items: center; gap: 8px;
      animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both; }
    .form-group:nth-child(1) { animation-delay: 0.25s; }
    .form-group:nth-child(2) { animation-delay: 0.3s; }

    .form-label { font-size: 12px; font-weight: 500; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; display: block; }

    .input-wrap { position: relative; }
    .form-input {
      width: 100%; padding: 14px 16px;
      background: var(--input-bg);
      border: 1px solid var(--border2);
      border-radius: 14px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: var(--muted); }
    .form-input:focus { border-color: rgba(201,168,76,0.5); box-shadow: 0 0 0 3px rgba(201,168,76,0.08); }

    .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 4px; transition: color 0.2s; }
    .toggle-pw:hover { color: var(--muted2); }

    /* ── Submit button ── */
    .btn-submit {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px 24px; margin-top: 8px;
      background: linear-gradient(135deg, #b8922a, var(--accent), #d4b050);
      color: #1a1200; border: none; border-radius: 14px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.2px;
      box-shadow: 0 4px 20px rgba(201,168,76,0.3);
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      position: relative; overflow: hidden;
      animation: fadeUp 0.6s 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }
    .btn-submit::after { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); transform: skewX(-15deg); transition: left 0.5s; }
    .btn-submit:hover::after { left: 160%; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(201,168,76,0.45); }
    .btn-submit:active { transform: scale(0.98); }

    /* ── Forgot link — exactly like student login page ── */
    .forgot-link {
      display: block; text-align: center;
      margin-top: 16px; margin-bottom: 4px;
      font-size: 13px; color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      animation: fadeUp 0.6s 0.38s cubic-bezier(0.16,1,0.3,1) both;
    }
    .forgot-link:hover { color: var(--accent); }

    /* ── Footer ── */
    .login-footer {
      text-align: center; margin-top: 20px;
      font-size: 12px; color: var(--muted);
      animation: fadeUp 0.6s 0.42s cubic-bezier(0.16,1,0.3,1) both;
    }
    .login-footer a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
    .login-footer a:hover { color: var(--text); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-card">

    <a href="{% url 'login' %}" class="back-link">← Back</a>

    <div class="logo-wrap">
      <div class="logo-icon">👨‍🏫</div>
    </div>

    <h1 class="login-title">Teacher Login</h1>
    <div class="role-badge">🔐 Teacher access only</div>

    {% if messages %}
      {% for message in messages %}
      <div class="error-msg">⚠ {{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'teacher_login' %}">
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="Enter username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input type="password" name="password" id="pwField" class="form-input" placeholder="Enter password" required autocomplete="current-password">
          <button type="button" class="toggle-pw" onclick="togglePw()" id="toggleBtn">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-submit">Login</button>
    </form>

    <!-- Forgot password link — same style as student login -->
    <a href="{% url 'teacher_forgot_password' %}" class="forgot-link">Forgot password?</a>

    <div class="login-footer">
      Not a teacher? <a href="{% url 'student_login' %}">Student Login →</a>
    </div>

  </div>

  <script>
    function togglePw() {
      const f = document.getElementById('pwField');
      const b = document.getElementById('toggleBtn');
      if (f.type === 'password') { f.type = 'text'; b.textContent = '🙈'; }
      else { f.type = 'password'; b.textContent = '👁'; }
    }
  </script>

</body>
</html>
